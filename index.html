<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akıllı Menü - القائمة</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    
    <style>
        :root { --primary-color: #ff9800; --bg-color: #121212; --card-bg: #333333; --tab-bg: #d1c4e9; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: white; margin: 0; padding-bottom: 100px; }
        
        /* الهيدر */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px; }
        .header h1 { color: var(--primary-color); font-size: 1.5em; margin: 0; flex-grow: 1; text-align: center; }
        
        /* نظام التبويبات العلوي */
        .tabs-container { display: flex; overflow-x: auto; padding: 10px; gap: 10px; white-space: nowrap; scrollbar-width: none; }
        .tabs-container::-webkit-scrollbar { display: none; }
        .tab-btn { background: var(--tab-bg); color: #000; border: none; padding: 12px 25px; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { background: white; box-shadow: 0 0 10px rgba(255,255,255,0.5); }

        /* حاوية الوجبات */
        .menu-container { padding: 15px; }
        .food-card { background: var(--card-bg); border-radius: 15px; margin-bottom: 15px; display: flex; align-items: center; padding: 15px; position: relative; }
        .food-details { flex-grow: 1; padding-right: 15px; }
        .food-details h3 { margin: 0; font-size: 1.2em; }
        .food-details .price { color: #b39ddb; font-weight: bold; margin-top: 10px; display: block; }
        .food-img { width: 100px; height: 100px; border-radius: 10px; object-fit: cover; }

        /* أزرار التحكم بالكمية (+ / -) */
        .controls { display: flex; align-items: center; gap: 10px; margin-top: 15px; }
        .btn-plus { background: #4caf50; color: white; border: none; width: 30px; height: 30px; border-radius: 5px; font-size: 1.5em; line-height: 1; cursor: pointer; }
        .btn-minus { background: #ff5722; color: white; border: none; width: 30px; height: 30px; border-radius: 5px; font-size: 1.5em; line-height: 1; cursor: pointer; }
        .count { font-size: 1.2em; font-weight: bold; min-width: 20px; text-align: center; }

        /* الشريط السفلي */
        .footer-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-color); padding: 15px; display: flex; gap: 10px; border-top: 1px solid #333; }
        .btn-confirm { background: var(--primary-color); color: white; border: none; flex: 1; padding: 15px; border-radius: 30px; font-weight: bold; font-size: 1em; cursor: pointer; }
        .btn-status { background: #4caf50; color: white; border: none; flex: 1; padding: 15px; border-radius: 30px; font-weight: bold; font-size: 1em; cursor: pointer; }

        .category-header { color: var(--primary-color); border-bottom: 1px dashed var(--primary-color); padding: 10px 0; margin: 20px 0 10px; text-align: center; }
    </style>
</head>
<body>

    <div class="header">
        <span style="font-size: 1.5em;">🔍</span>
        <h1>Akıllı Menü</h1>
        <span style="font-size: 1.5em;">📱</span>
    </div>

    <div class="tabs-container">
        <button class="tab-btn active" onclick="switchCategory('Yeni & popüler', this)">Yeni & popüler</button>
        <button class="tab-btn" onclick="switchCategory('Ana Yemek', this)">Ana Yemek</button>
        <button class="tab-btn" onclick="switchCategory('Tatlılar', this)">Tatlılar</button>
        <button class="tab-btn" onclick="switchCategory('İçecekler', this)">İçecekler</button>
    </div>

    <div class="menu-container" id="menuGrid">
        </div>

    <div class="footer-bar">
        <button id="orderBtn" class="btn-confirm" onclick="confirmOrder()">Sipariş Onayla (0 TL)</button>
        <button class="btn-status">Sipariş Durumu</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDwTyRZBdaGR8YTizahU_9rxJX6vQBC2yw",
            authDomain: "akilli-menu.firebaseapp.com",
            databaseURL: "https://akilli-menu-default-rtdb.firebaseio.com",
            projectId: "akilli-menu",
            storageBucket: "akilli-menu.firebasestorage.app",
            messagingSenderId: "238716948153",
            appId: "1:238716948153:web:8ee743bbbae57867fa1568"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let currentCart = {}; // { foodId: quantity }
        let currentCategory = 'Yeni & popüler';
        const tableNum = window.location.pathname.split('/').pop() || "01";

        // تبديل الأقسام
        function switchCategory(cat, btn) {
            currentCategory = cat;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            loadMenu();
        }

        function loadMenu() {
            const menuGrid = document.getElementById('menuGrid');
            menuGrid.innerHTML = '<p style="text-align:center">جاري التحميل...</p>';

            database.ref(currentCategory).on('value', (snapshot) => {
                menuGrid.innerHTML = `<div class="category-header">--- ${currentCategory} ---</div>`;
                if (snapshot.exists()) {
                    snapshot.forEach((child) => {
                        const food = child.val();
                        const foodId = child.key;
                        renderFood(food, foodId);
                    });
                } else {
                    menuGrid.innerHTML += '<p style="text-align:center">لا توجد وجبات في هذا القسم حالياً</p>';
                }
            });
        }

        function renderFood(food, id) {
            const menuGrid = document.getElementById('menuGrid');
            const count = currentCart[id] || 0;
            const card = document.createElement('div');
            card.className = 'food-card';
            card.innerHTML = `
                <div class="food-details">
                    <h3>${food.name}</h3>
                    <span class="price">${food.price} TL</span>
                    <div class="controls">
                        <button class="btn-plus" onclick="updateItem('${id}', '${food.name}', ${food.price}, 1)">+</button>
                        <span class="count" id="count-${id}">${count}</span>
                        <button class="btn-minus" onclick="updateItem('${id}', '${food.name}', ${food.price}, -1)">-</button>
                    </div>
                </div>
                <img src="${food.imageUrl || 'https://via.placeholder.com/100'}" class="food-img">
            `;
            menuGrid.appendChild(card);
        }

        function updateItem(id, name, price, delta) {
            if (!currentCart[id]) currentCart[id] = { name, price, qty: 0 };
            currentCart[id].qty += delta;
            if (currentCart[id].qty < 0) currentCart[id].qty = 0;
            
            document.getElementById(`count-${id}`).innerText = currentCart[id].qty;
            updateFooter();
        }

        function updateFooter() {
            let total = 0;
            for (let id in currentCart) {
                total += currentCart[id].qty * currentCart[id].price;
            }
            document.getElementById('orderBtn').innerText = `Sipariş Onayla (${total} TL)`;
        }

        function confirmOrder() {
            let itemsStr = "";
            let total = 0;
            for (let id in currentCart) {
                if (currentCart[id].qty > 0) {
                    itemsStr += `${currentCart[id].name} x${currentCart[id].qty}, `;
                    total += currentCart[id].qty * currentCart[id].price;
                }
            }

            if (total === 0) return alert("الرجاء اختيار وجبات أولاً");

            const ordersRef = database.ref('Orders');
            const newOrder = ordersRef.push();
            newOrder.set({
                orderId: newOrder.key,
                tableNumber: "Masa " + tableNum.padStart(2, '0'),
                items: itemsStr.slice(0, -2),
                totalPrice: total + " TL",
                status: "Pending",
                timestamp: Date.now()
            }).then(() => {
                alert("تم إرسال طلبك! سيصلك النادل قريباً.");
                location.reload();
            });
        }

        // تشغيل القسم الأول عند الفتح
        loadMenu();
    </script>
</body>
</html>
