<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akıllı Menü</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; padding: 50px; }
        .card { border: 1px solid #333; padding: 20px; border-radius: 20px; background: #1e1e1e; }
        .btn { display: block; margin: 20px auto; padding: 15px; background: #007bff; color: white; text-decoration: none; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Akıllı Menü</h1>
        <h2 id="tableText">جاري فحص الطاولة...</h2>
        <a href="#" class="btn">تصفح القائمة الآن</a>
    </div>
    <a href="#" id="openAppBtn" class="btn">تصفح القائمة في التطبيق</a>

<script>
    // 1. قراءة رقم الطاولة
    const urlParams = new URLSearchParams(window.location.search);
    const idFromQuery = urlParams.get('id');
    const path = window.location.pathname.split('/').pop();
    const tableNum = idFromQuery || path || "";

    document.getElementById('tableText').innerText = "طاولة رقم: " + (tableNum || "غير محددة");

    // 2. الربط مع التطبيق
    const openAppBtn = document.getElementById('openAppBtn');
    
    // الرابط الذي سيفهمه الأندرويد (تأكد أنه نفس الذي وضعته في Android Studio)
    const appUrl = "http://akillimenu.com/" + tableNum; 

    openAppBtn.onclick = function() {
        // محاولة فتح التطبيق
        window.location.href = appUrl;
        
        // إذا لم يفتح التطبيق خلال ثانيتين، يمكننا توجيهه لصفحة ويب أخرى أو تنبيهه
        setTimeout(function() {
            alert("إذا لم يفتح التطبيق، يرجى التأكد من تثبيته على جهازك.");
        }, 2000);
    };
</script>
</body>
</html>
