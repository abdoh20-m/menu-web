<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akıllı Menü - القائمة الحقيقية</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    
    <style>
        :root { --primary-color: #ffcc00; --bg-color: #121212; --card-bg: #1e1e1e; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: white; margin: 0; padding: 0; }
        .header { background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1514933651103-005eec06c04b?auto=format&fit=crop&w=500&q=80'); background-size: cover; text-align: center; padding: 40px 20px; }
        .header h1 { margin: 0; color: var(--primary-color); font-size: 2.2em; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .table-badge { background: var(--primary-color); color: black; padding: 5px 15px; border-radius: 20px; font-weight: bold; display: inline-block; margin-top: 10px; font-size: 0.9em; }
        .menu-container { padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .food-card { background: var(--card-bg); border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .food-card img { width: 100%; height: 120px; object-fit: cover; background-color: #333; }
        .food-info { padding: 12px; text-align: center; }
        .food-info h3 { margin: 0; font-size: 1em; color: #fff; }
        .food-info .price { color: var(--primary-color); font-weight: bold; margin-top: 8px; font-size: 1.1em; }
        #loading { text-align: center; margin-top: 50px; color: #888; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Akıllı Menü</h1>
        <div id="tableText" class="table-badge">طاولة رقم: ..</div>
    </div>

    <div id="loading">جاري تحضير القائمة الشهية...</div>
    <div class="menu-container" id="menuGrid"></div>

    <script>
        // 1. إعدادات Firebase الخاصة بك التي استخرجتها
        const firebaseConfig = {
            apiKey: "AIzaSyDwTyRZBdaGR8YTizahU_9rxJX6vQBC2yw",
            authDomain: "akilli-menu.firebaseapp.com",
            databaseURL: "https://akilli-menu-default-rtdb.firebaseio.com",
            projectId: "akilli-menu",
            storageBucket: "akilli-menu.firebasestorage.app",
            messagingSenderId: "238716948153",
            appId: "1:238716948153:web:8ee743bbbae57867fa1568"
        };

        // تهيئة Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 2. قراءة رقم الطاولة من الرابط
        const tableNum = window.location.pathname.split('/').pop() || "عامة";
        document.getElementById('tableText').innerText = "طاولة رقم: " + tableNum;

        // 3. جلب البيانات من Firebase (تأكد أن المسار هو 'foods')
        const menuRef = database.ref('foods'); 
        menuRef.on('value', (snapshot) => {
            const menuGrid = document.getElementById('menuGrid');
            const loading = document.getElementById('loading');
            menuGrid.innerHTML = '';
            
            if (snapshot.exists()) {
                loading.style.display = 'none';
                snapshot.forEach((childSnapshot) => {
                    const food = childSnapshot.val();
                    menuGrid.innerHTML += `
                        <div class="food-card">
                            <img src="${food.imageUrl || 'https://via.placeholder.com/150'}" alt="${food.name}">
                            <div class="food-info">
                                <h3>${food.name}</h3>
                                <div class="price">${food.price} TL</div>
                            </div>
                        </div>
                    `;
                });
            } else {
                loading.innerText = "القائمة فارغة حالياً، أضف وجبات من تطبيق الأدمن!";
            }
        });
    </script>
</body>
</html>
