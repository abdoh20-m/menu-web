<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akıllı Menü - القائمة</title>
    <style>
        body { font-family: sans-serif; background-color: #121212; color: white; margin: 0; padding: 20px; }
        .header { text-align: center; padding: 20px; border-bottom: 1px solid #333; }
        .table-info { color: #aaa; font-size: 0.9em; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .menu-item { background: #1e1e1e; border-radius: 12px; padding: 10px; text-align: center; }
        .menu-item img { width: 100%; border-radius: 8px; height: 100px; object-fit: cover; }
        .menu-item h3 { font-size: 1em; margin: 10px 0 5px; }
        .price { color: #2196F3; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Akıllı Menü</h1>
        <div id="tableText" class="table-info">طاولة رقم: جاري التحميل...</div>
    </div>

    <div class="menu-grid" id="menuContainer">
        </div>

    <script>
        // 1. تحديد رقم الطاولة من الرابط
        const path = window.location.pathname.split('/').pop();
        document.getElementById('tableText').innerText = "طاولة رقم: " + (path || "عامة");

        // 2. قائمة الطعام (يمكنك إضافة أصنافك الحقيقية هنا)
        const myMenu = [
            { name: "شاورما دجاج", price: "15 TL", img: "https://via.placeholder.com/150" },
            { name: "بيتزا خضار", price: "45 TL", img: "https://via.placeholder.com/150" },
            { name: "كبة مشوية", price: "30 TL", img: "https://via.placeholder.com/150" },
            { name: "عصير برتقال", price: "10 TL", img: "https://via.placeholder.com/150" }
        ];

        const container = document.getElementById('menuContainer');
        
        // عرض القائمة تلقائياً
        myMenu.forEach(item => {
            container.innerHTML += `
                <div class="menu-item">
                    <img src="${item.img}" alt="${item.name}">
                    <h3>${item.name}</h3>
                    <div class="price">${item.price}</div>
                </div>
            `;
        });
    </script>
</body>
</html>
